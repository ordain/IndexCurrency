# Application defaults, applied automatically to every workspace and overridable in the UI.
#
# This file holds two kinds of defaults, told apart by the key:
#
#   1. Proxy-splice backfills   <fund-symbol>=<proxy-symbol>
#   2. Risk-free rates          <currency>.RiskFreeRate=<annual percent>
#
# Add or change entries here — no code changes needed. Fund/proxy symbols are matched case-insensitively.

# ── Proxy-splice backfills ──────────────────────────────────────────────────
# Each line maps a fund to a longer-lived proxy whose returns estimate the fund's history before it
# existed (see the "Backfill before ..." control on a ticker card). Estimated years are flagged in the
# quilt chart. Users can still override or clear a default per ticker in the UI.
#
# Avantis small-cap value funds launched in 2019; DFA's equivalents (same lineage) reach back to the 1990s.
AVUV=DFSVX
AVDV=DISVX

# Captor Iris Bond (A/B, launched 2017) — a long-duration (~10-15y) SEK covered-bond fund with a receiver-swap
# overlay. No fund matches it, so the proxy CAPTORIRISBF is a synthetic pre-2017 total-return series built by
# IrisBondBackfill (factor regression on 10y govt yield + 5y covered spread from Riksbank; see that class).
# It lives in cache/CAPTORIRISBF.csv — regenerate it with IrisBondBackfill + RiksbankFetcher.
SE0012204758=CAPTORIRISBF
SE0012204766=CAPTORIRISBF

# ── Risk-free rates (annual %) ──────────────────────────────────────────────
# Risk-free rate per display currency, used by the Sortino ratio (target return) and UPI / Martin ratio
# (excess return). Edited values in the UI are saved
# with the workspace and override these defaults; unchanged currencies keep picking up whatever is set here.
USD.RiskFreeRate=4.3
EUR.RiskFreeRate=2.4
SEK.RiskFreeRate=2.0
XDR.RiskFreeRate=3.0
