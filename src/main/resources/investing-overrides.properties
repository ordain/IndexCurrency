# investing.com pairId overrides.
#
# By default the backend resolves an investing.com instrument by auto-searching its public
# search API with the typed ticker. Auto-search can mis-match for indices, forex, or obscure
# tickers. Add entries here to pin a specific investing.com pairId for a given Yahoo-style symbol.
#
# Format:  <yahoo-symbol>=<pairId>[,<CURRENCY>]
#
# The pairId is the numeric id investing.com uses internally. To find it, search the instrument
# on the investing.com search API (https://api.investing.com/api/search/v2/search?q=...) and read
# the "id" field of the matching quote.
#
# The optional CURRENCY (e.g. SEK, EUR) sets the instrument's native currency. Auto-search derives
# currency from the listing country, but an override skips search, so specify it here when it isn't
# USD. Examples (uncomment / adjust as needed):
# ^GSPC=166         # S&P 500 (USD)
# EURUSD=X=1
# AAPL=6408
# 0P0000YVZ3=1026972,SEK
