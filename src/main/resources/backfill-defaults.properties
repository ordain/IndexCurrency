# Default proxy-splice backfills, applied automatically to every workspace.
#
# Each line maps a fund to a longer-lived proxy whose returns estimate the fund's history before it
# existed (see the "Backfill before ..." control on a ticker card). Estimated years are flagged in the
# quilt chart. Users can still override or clear a default per ticker in the UI.
#
# Format:  <fund-symbol>=<proxy-symbol>
#
# Add or change entries here — no code changes needed. Symbols are matched case-insensitively.

# Avantis small-cap value funds launched in 2019; DFA's equivalents (same lineage) reach back to the 1990s.
AVUV=DFSVX
AVDV=DISVX
